<!DOCTYPE html>
<html lang="ru" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SeedWave — install any product as an app icon</title>
<meta name="theme-color" content="#0F1720">
<meta name="apple-mobile-web-app-title" content="SeedWave">
<link rel="icon" type="image/svg+xml" href="hub/icon.svg">

<meta property="og:title" content="SeedWave apps — right on your home screen">
<meta property="og:description" content="Any SeedWave product installs in 4 steps on iPhone and Android — no App Store, no Google Play. The icon lands on the home screen and opens like a normal app.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ikartuzov-hub.github.io/seedwave-catalog/install.html">
<meta property="og:image" content="https://ikartuzov-hub.github.io/seedwave-catalog/og-install-en.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="en_GB">
<meta property="og:locale:alternate" content="ru_RU">
<meta property="og:locale:alternate" content="pt_PT">
<meta property="og:locale:alternate" content="es_ES">
<meta property="og:locale:alternate" content="de_DE">
<meta property="og:site_name" content="SeedWave">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ikartuzov-hub.github.io/seedwave-catalog/og-install-en.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1720; --card:#16212B; --card-2:#1D2A35; --ink:#E8EEF2; --dim:#8AA0B0;
    --accent:#0E8FA8; --accent-ink:#04222A; --line:#25323D;
  }
  :root[data-theme="light"]{
    --bg:#F4F7F9; --card:#FFFFFF; --card-2:#EDF3F6; --ink:#15323D; --dim:#5B7180;
    --accent:#0E8FA8; --accent-ink:#FFFFFF; --line:#D8E2E8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
    padding:calc(60px + env(safe-area-inset-top,0px)) 20px 40px}
  .topbar-bg{position:fixed;top:0;left:0;right:0;height:calc(54px + env(safe-area-inset-top,0px));background:var(--bg);z-index:9;transition:background .4s;border-bottom:1px solid var(--line)}
  .lockup{position:fixed;top:calc(13px + env(safe-area-inset-top,0px));left:18px;z-index:10;display:flex;align-items:center;gap:9px}
  .lockup .ic{width:26px;height:26px;border-radius:7px;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;color:var(--accent)}
  .lockup .nm{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:17px;max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topctrl{position:fixed;top:calc(13px + env(safe-area-inset-top,0px));right:16px;z-index:10;display:flex;align-items:center;gap:8px}
  .cbtn{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--dim);background:transparent;color:var(--ink);cursor:pointer;
    font-size:12px;font-weight:600;letter-spacing:.02em;line-height:1;font-family:inherit;
    transition:border-color .2s,color .2s,transform .15s}
  .cbtn:hover{border-color:var(--accent);color:var(--accent)}
  .cbtn:active{transform:scale(.92)}
  .langwrap{position:relative}
  .langmenu{position:absolute;top:calc(100% + 8px);right:0;min-width:168px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:6px;display:none;flex-direction:column;z-index:60;
    box-shadow:0 10px 28px rgba(0,0,0,.28)}
  .langmenu.open{display:flex}
  .langmenu button{display:flex;align-items:center;gap:8px;background:transparent;border:none;color:var(--dim);
    text-align:left;padding:9px 11px;border-radius:9px;font-family:inherit;font-size:14px;cursor:pointer}
  .langmenu button:hover{background:var(--card-2);color:var(--ink)}
  .langmenu button.on{color:var(--accent)}
  .langmenu .lc{display:inline-block;width:26px;font-weight:600;font-size:12px;letter-spacing:.04em;color:var(--dim)}
  .langmenu button.on .lc{color:var(--accent)}

  .wrap{max-width:540px;margin:0 auto}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(23px,5.5vw,30px);line-height:1.25;margin-bottom:8px;text-align:center}
  .lead{text-align:center;color:var(--dim);margin-bottom:24px}
  .installed{display:none;text-align:center;background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:14px;margin-bottom:20px;color:var(--accent);font-weight:600}

  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;padding:12px;border:1px solid var(--line);border-radius:12px;background:none;color:var(--dim);
    font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.2s}
  .tab.on{background:var(--card);color:var(--ink);border-color:var(--accent)}
  .panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 20px 22px}
  .panel.on{display:block}
  ol{list-style:none;counter-reset:s}
  li{counter-increment:s;padding:11px 0 11px 44px;position:relative;border-bottom:1px solid var(--line)}
  li:last-child{border-bottom:none}
  li::before{content:counter(s);position:absolute;left:0;top:9px;width:29px;height:29px;border-radius:50%;
    background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
  li b{color:var(--accent)}

  .openbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:18px;
    background:var(--accent);color:var(--accent-ink);text-decoration:none;font-weight:600;font-size:16px;
    padding:15px;border-radius:14px;border:none;cursor:pointer;font-family:inherit}
  .openbtn:active{transform:scale(.985)}

  .share{margin-top:26px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
  .share h2{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:17px;margin-bottom:4px}
  .share p{color:var(--dim);font-size:13.5px;margin-bottom:14px}
  .share-row{display:flex;gap:8px;flex-wrap:wrap}
  .sbtn{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:7px;
    background:none;border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px;
    font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
  .sbtn:hover{border-color:var(--accent);color:var(--accent)}
  .sbtn:active{transform:scale(.97)}
  #qrwrap{display:none;margin-top:16px;text-align:center}
  #qrwrap.show{display:block}
  #qr{display:inline-flex;padding:12px;background:#fff;border-radius:12px}
  #qr img,#qr canvas{display:block}
  .qrhint{color:var(--dim);font-size:12.5px;margin-top:8px}

  .hubbox{margin-top:26px;background:linear-gradient(160deg,var(--card) 0%,var(--card-2) 100%);
    border:1px solid var(--line);border-radius:16px;padding:20px}
  .hubbox h2{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:18px;margin-bottom:6px}
  .hubbox p{color:var(--dim);font-size:14px;margin-bottom:15px}
  .hubbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:none;border:1px solid var(--accent);color:var(--accent);text-decoration:none;
    font-weight:600;font-size:15px;padding:14px;border-radius:13px;font-family:inherit;transition:.2s}
  .hubbtn:hover{background:var(--accent);color:var(--accent-ink)}
  .hubbtn:active{transform:scale(.985)}
  footer{margin-top:34px;text-align:center;font-size:15px;color:var(--dim);line-height:1.6;padding-bottom:56px}
  footer a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent);
    text-underline-offset:4px;display:inline-block;padding:8px 4px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="topbar-bg"></div>
<div class="lockup">
  <span class="ic" id="appIc"><svg viewBox="0 0 100 100" width="26" height="26" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 60 Q32 52 44 60 Q56 68 68 60 Q80 52 80 52"/><path d="M20 44 Q32 36 44 44 Q56 52 68 44 Q80 36 80 36"/></svg></span>
  <span class="nm" id="appNm"></span>
</div>
<div class="topctrl">
  <div class="langwrap">
    <button class="cbtn" id="langBtn" aria-haspopup="true" aria-expanded="false" aria-label="Язык"><span id="langCode">RU</span></button>
    <div class="langmenu" id="langmenu"></div>
  </div>
  <button class="cbtn" id="themeBtn" aria-label="theme">☀</button>
</div>

<div class="wrap">
  <h1 id="h1"></h1>
  <p class="lead" id="lead"></p>

  <div class="installed" id="installed"></div>

  <div class="tabs">
    <button class="tab" id="tabIos" data-os="ios"></button>
    <button class="tab" id="tabAnd" data-os="android"></button>
  </div>
  <div class="panel" id="panel-ios"><ol id="list-ios"></ol><a class="openbtn" id="openIos"></a></div>
  <div class="panel" id="panel-android"><ol id="list-android"></ol><a class="openbtn" id="openAnd"></a></div>

  <div class="share">
    <h2 id="shareH"></h2>
    <p id="shareP"></p>
    <div class="share-row">
      <button class="sbtn" id="btnShare" style="display:none"><span>🔗</span><span id="shareBtnT"></span></button>
      <button class="sbtn" id="btnCopy"><span>📋</span><span id="copyBtnT"></span></button>
      <button class="sbtn" id="btnQr"><span>▣</span><span id="qrBtnT"></span></button>
    </div>
    <div id="qrwrap"><div id="qr"></div><div class="qrhint" id="qrHint"></div></div>
  </div>

  <div class="hubbox">
    <h2 id="hubH"></h2>
    <p id="hubP"></p>
    <a class="hubbtn" id="hubBtn" target="_blank" rel="noopener"><span>🌊</span><span id="hubBtnT"></span></a>
  </div>

  <footer>© <span id="yr"></span> <a id="hubLink" target="_blank" rel="noopener">SeedWave</a> · <a href="https://www.linkedin.com/in/igor-kartuzov/" target="_blank" rel="noopener">Igor Kartuzov</a></footer>
</div>

<script>
/* ===== Параметры ===== */
const q=new URLSearchParams(location.search);
const APP  = q.get('app')  || '';
const NAME = (q.get('name')|| '').trim();
const ICON = q.get('icon') || '';
const HUB  = q.get('hub')  || 'https://ikartuzov-hub.github.io/seedwave-catalog/hub/';
const $=i=>document.getElementById(i);

/* ===== Локали (UI install-инструкции) ===== */
const T={
 ru:{name:"Русский", appWord:"приложение",
   h1:"Установи {n} на телефон",
   lead:"Будет как обычная иконка приложения — открывается с экрана, без браузера.",
   ios:"iPhone", android:"Android",
   iosSteps:["Открой ссылку в <b>Safari</b>","Нажми <b>«Поделиться»</b> (квадрат со стрелкой ↑ внизу)","Выбери <b>«На экран „Домой“»</b>","Готово — значок {n} на экране"],
   andSteps:["Открой ссылку в <b>Chrome</b>","Нажми <b>⋮</b> (три точки вверху справа)","Выбери <b>«Добавить на главный экран»</b>","Готово — значок {n} на экране"],
   open:"Открыть {n}", installed:"✓ {n} уже установлено на этом устройстве",
   shareH:"Поделиться установкой", shareP:"Отправь ссылку, покажи QR или скопируй — чтобы установить на другом телефоне.",
   shareBtn:"Поделиться", copyBtn:"Скопировать ссылку", copied:"Скопировано ✓", qrBtn:"QR-код",
   qrHint:"Наведи камеру телефона — откроется эта инструкция.",
   hubH:"Что ещё есть в SeedWave", hubP:"Каталог продуктов платформы: меню для кафе, тренажёры языка, гиды, чекеры субсидий. Всё ставится на телефон так же — за 4 шага.", hubBtn:"Открыть каталог SeedWave"},
 en:{name:"English", appWord:"the app",
   h1:"Install {n} on your phone",
   lead:"It works like a normal app icon — opens from the home screen, no browser.",
   ios:"iPhone", android:"Android",
   iosSteps:["Open the link in <b>Safari</b>","Tap <b>«Share»</b> (square with ↑ arrow at the bottom)","Choose <b>«Add to Home Screen»</b>","Done — the {n} icon is on your screen"],
   andSteps:["Open the link in <b>Chrome</b>","Tap <b>⋮</b> (three dots, top right)","Choose <b>«Add to Home screen»</b>","Done — the {n} icon is on your screen"],
   open:"Open {n}", installed:"✓ {n} is already installed on this device",
   shareH:"Share the install", shareP:"Send the link, show the QR, or copy it — to install on another phone.",
   shareBtn:"Share", copyBtn:"Copy link", copied:"Copied ✓", qrBtn:"QR code",
   qrHint:"Point your phone camera at it to open these steps.",
   hubH:"More from SeedWave", hubP:"The platform catalogue: café menus, language trainers, guides, grant checkers. Everything installs the same way — in 4 steps.", hubBtn:"Open the SeedWave catalogue"},
 pt:{name:"Português", appWord:"a aplicação",
   h1:"Instala {n} no telemóvel",
   lead:"Fica como um ícone normal de app — abre do ecrã principal, sem navegador.",
   ios:"iPhone", android:"Android",
   iosSteps:["Abre o link no <b>Safari</b>","Toca em <b>«Partilhar»</b> (quadrado com seta ↑ em baixo)","Escolhe <b>«Adicionar ao ecrã principal»</b>","Pronto — o ícone {n} no ecrã"],
   andSteps:["Abre o link no <b>Chrome</b>","Toca em <b>⋮</b> (três pontos, em cima à direita)","Escolhe <b>«Adicionar ao ecrã principal»</b>","Pronto — o ícone {n} no ecrã"],
   open:"Abrir {n}", installed:"✓ {n} já está instalado neste dispositivo",
   shareH:"Partilhar a instalação", shareP:"Envia o link, mostra o QR ou copia — para instalar noutro telemóvel.",
   shareBtn:"Partilhar", copyBtn:"Copiar link", copied:"Copiado ✓", qrBtn:"Código QR",
   qrHint:"Aponta a câmara do telemóvel para abrir estes passos.",
   hubH:"Mais da SeedWave", hubP:"O catálogo da plataforma: menus para cafés, treinadores de línguas, guias, verificadores de apoios. Tudo se instala da mesma forma — em 4 passos.", hubBtn:"Abrir o catálogo SeedWave"},
 es:{name:"Español", appWord:"la app",
   h1:"Instala {n} en tu móvil",
   lead:"Funciona como un icono normal — se abre desde la pantalla, sin navegador.",
   ios:"iPhone", android:"Android",
   iosSteps:["Abre el enlace en <b>Safari</b>","Toca <b>«Compartir»</b> (cuadrado con flecha ↑ abajo)","Elige <b>«Añadir a pantalla de inicio»</b>","Listo — el icono {n} en tu pantalla"],
   andSteps:["Abre el enlace en <b>Chrome</b>","Toca <b>⋮</b> (tres puntos, arriba a la derecha)","Elige <b>«Añadir a pantalla de inicio»</b>","Listo — el icono {n} en tu pantalla"],
   open:"Abrir {n}", installed:"✓ {n} ya está instalado en este dispositivo",
   shareH:"Compartir la instalación", shareP:"Envía el enlace, muestra el QR o cópialo — para instalar en otro móvil.",
   shareBtn:"Compartir", copyBtn:"Copiar enlace", copied:"Copiado ✓", qrBtn:"Código QR",
   qrHint:"Apunta la cámara del móvil para abrir estos pasos.",
   hubH:"Más de SeedWave", hubP:"El catálogo de la plataforma: menús para cafeterías, entrenadores de idiomas, guías, verificadores de ayudas. Todo se instala igual — en 4 pasos.", hubBtn:"Abrir el catálogo SeedWave"},
 de:{name:"Deutsch", appWord:"die App",
   h1:"Installiere {n} auf dem Handy",
   lead:"Wie ein normales App-Symbol — öffnet vom Startbildschirm, ohne Browser.",
   ios:"iPhone", android:"Android",
   iosSteps:["Öffne den Link in <b>Safari</b>","Tippe auf <b>«Teilen»</b> (Quadrat mit Pfeil ↑ unten)","Wähle <b>«Zum Home-Bildschirm»</b>","Fertig — das {n}-Symbol ist da"],
   andSteps:["Öffne den Link in <b>Chrome</b>","Tippe auf <b>⋮</b> (drei Punkte, oben rechts)","Wähle <b>«Zum Startbildschirm hinzufügen»</b>","Fertig — das {n}-Symbol ist da"],
   open:"{n} öffnen", installed:"✓ {n} ist auf diesem Gerät bereits installiert",
   shareH:"Installation teilen", shareP:"Sende den Link, zeige den QR oder kopiere ihn — zum Installieren auf einem anderen Handy.",
   shareBtn:"Teilen", copyBtn:"Link kopieren", copied:"Kopiert ✓", qrBtn:"QR-Code",
   qrHint:"Richte die Handy-Kamera darauf, um diese Anleitung zu öffnen.",
   hubH:"Mehr von SeedWave", hubP:"Der Katalog der Plattform: Café-Karten, Sprachtrainer, Guides, Förder-Checker. Alles wird genauso installiert — in 4 Schritten.", hubBtn:"SeedWave-Katalog öffnen"}
};

/* ===== Язык / тема ===== */
let lang=q.get('lang'); if(!T[lang]){const n=(navigator.language||'ru').slice(0,2).toLowerCase(); lang=T[n]?n:'ru';}
let theme=(q.get('theme')==='light'||q.get('theme')==='day')?'light':'night';
if(!q.get('theme')){try{const s=localStorage.getItem('sw_install_theme'); if(s==='light'||s==='night')theme=s;}catch(e){}}

const rep=(s)=>String(s).replace(/\{n\}/g, NAME || T[lang].appWord);

function render(){
  const t=T[lang];
  document.documentElement.lang=lang;
  $('appNm').textContent = NAME || 'SeedWave';
  $('h1').innerHTML=rep(t.h1);
  $('lead').textContent=rep(t.lead);
  $('tabIos').textContent='📱 '+t.ios;
  $('tabAnd').textContent='🤖 '+t.android;
  $('list-ios').innerHTML=t.iosSteps.map(s=>'<li>'+rep(s)+'</li>').join('');
  $('list-android').innerHTML=t.andSteps.map(s=>'<li>'+rep(s)+'</li>').join('');
  $('openIos').textContent=rep(t.open); $('openAnd').textContent=rep(t.open);
  $('installed').textContent=rep(t.installed);
  $('shareH').textContent=t.shareH; $('shareP').textContent=t.shareP;
  $('shareBtnT').textContent=t.shareBtn; $('copyBtnT').textContent=t.copyBtn; $('qrBtnT').textContent=t.qrBtn;
  $('qrHint').textContent=t.qrHint;
  $('langCode').textContent=lang.toUpperCase();
  const openHref = APP ? (APP+(APP.includes('?')?'&':'?')+'lang='+lang+'&theme='+theme) : (HUB+'?lang='+lang);
  $('openIos').href=openHref; $('openAnd').href=openHref;
  $('hubLink').href=HUB+'?lang='+lang;
  $('hubH').textContent=t.hubH; $('hubP').textContent=t.hubP;
  $('hubBtnT').textContent=t.hubBtn; $('hubBtn').href=HUB+'?lang='+lang+'&theme='+theme;
  if(ICON){ $('appIc').innerHTML='<img src="'+ICON+'" alt="" width="26" height="26" style="border-radius:7px">'; }
}

/* меню §7.8.1 */
function buildMenu(){
  $('langmenu').innerHTML=Object.keys(T).map(c=>'<button data-lang="'+c+'"'+(c===lang?' class="on"':'')+'><span class="lc">'+c.toUpperCase()+'</span>'+T[c].name+'</button>').join('');
}
function closeLang(){ $('langmenu').classList.remove('open'); $('langBtn').setAttribute('aria-expanded','false'); }
$('langBtn').addEventListener('click',function(e){ e.stopPropagation(); const o=$('langmenu').classList.toggle('open'); this.setAttribute('aria-expanded',o?'true':'false'); if(o) buildMenu(); });
document.addEventListener('click',function(e){ const w=$('langBtn').closest('.langwrap'); if(w && !w.contains(e.target)) closeLang(); });
$('langmenu').addEventListener('click',function(e){ const b=e.target.closest('button'); if(!b) return; const c=b.dataset.lang; closeLang(); if(c===lang) return; const u=new URL(location.href); u.searchParams.set('lang',c); u.searchParams.set('theme',theme); location.href=u.toString(); });

/* тема light/night */
function setTheme(x){ theme=(x==='light')?'light':'night'; document.documentElement.setAttribute('data-theme',theme); $('themeBtn').textContent=(theme==='light')?'☾':'☀'; try{localStorage.setItem('sw_install_theme',theme);}catch(e){} $('hubLink').href=HUB+'?lang='+lang; }
$('themeBtn').onclick=()=>setTheme(theme==='light'?'night':'light');

/* табы + автоопределение платформы */
function selOs(os){ document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.os===os)); document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on')); $('panel-'+os).classList.add('on'); }
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>selOs(t.dataset.os));
const ua=navigator.userAgent||'';
const isIOS=/iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
const isAnd=/Android/.test(ua);

/* уже установлено? */
const standalone = window.matchMedia && (matchMedia('(display-mode: standalone)').matches) || navigator.standalone===true;

/* поделиться: Web Share / копировать / QR */
const shareUrl=()=>location.href;
if(navigator.share){ $('btnShare').style.display='flex';
  $('btnShare').onclick=()=>navigator.share({title:(NAME||'SeedWave'), text:$('h1').textContent, url:shareUrl()}).catch(()=>{}); }
$('btnCopy').onclick=async function(){ try{ await navigator.clipboard.writeText(shareUrl()); $('copyBtnT').textContent=T[lang].copied; setTimeout(()=>$('copyBtnT').textContent=T[lang].copyBtn,1800);}catch(e){ prompt('URL:', shareUrl()); } };
let qrDone=false;
$('btnQr').onclick=function(){ const w=$('qrwrap'); const show=w.classList.toggle('show'); if(show && !qrDone) makeQR(); };
function makeQR(){
  if(window.QRCode){ qrDone=true; $('qr').innerHTML=''; new QRCode($('qr'),{text:shareUrl(),width:188,height:188,correctLevel:QRCode.CorrectLevel.M}); return; }
  const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload=makeQR; s.onerror=()=>{ $('qrwrap').innerHTML='<div class="qrhint">QR: '+shareUrl()+'</div>'; };
  document.head.appendChild(s);
}

/* старт */
$('yr').textContent=new Date().getFullYear();
render(); setTheme(theme); buildMenu();
selOs(isAnd && !isIOS ? 'android' : 'ios');
if(standalone){ $('installed').style.display='block'; }
/* десктоп — сразу показать QR, чтобы открыть на телефоне */
if(!isIOS && !isAnd){ $('qrwrap').classList.add('show'); makeQR(); }
</script>
</body>
</html>
