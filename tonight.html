<style>

  .top{display:flex; align-items:center; justify-content:space-between; padding:18px 0 6px}

  .brandmark{display:inline-flex; width:28px; height:28px; color:var(--accent)}

  .bw{font-family:var(--display); font-size:1.45rem; letter-spacing:.01em; color:var(--ink); line-height:1}
  .topctrl{display:flex; align-items:center; gap:8px}
  .cbtn{width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; font-size:.8rem; font-weight:600; letter-spacing:.02em; line-height:1; font-family:var(--body); transition:border-color .2s, background .2s, transform .15s}

  .intro{text-align:center; padding:34px 6px 10px}

  .intro h1{font-family:var(--display); font-weight:400; font-size:2.55rem; line-height:1.05; margin:16px 0 0; letter-spacing:.005em; animation:rise .7s .25s ease both}
  .intro .lead{font-size:1.02rem; color:var(--soft); line-height:1.6; margin:16px auto 0; max-width:390px; animation:rise .7s .4s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)}}
  .ticker{margin:30px 0 4px; padding:11px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); background:var(--card); overflow:hidden; white-space:nowrap; animation:rise .7s .55s ease both}
  .ticker-row{display:inline-block; animation:tkr 26s linear infinite; font-size:.8rem; color:var(--soft)}
  .ticker-row b{color:var(--accent-2); font-weight:600}
  @keyframes tkr{from{transform:translateX(0)} to{transform:translateX(-50%)}}
  .cta{display:block; width:100%; border:none; cursor:pointer; background:var(--accent); color:var(--btn-ink); font-family:var(--body); font-weight:600; font-size:1rem; padding:15px; border-radius:14px; margin-top:26px; transition:transform .15s, filter .2s; animation:rise .7s .7s ease both}

  .demo{padding:18px 0 6px; animation:rise .5s ease both}
  .demo h2{font-family:var(--display); font-weight:400; font-size:2.2rem; line-height:1.05; margin:6px 0 4px; letter-spacing:.01em}
  .meta{font-size:.86rem; color:var(--soft)}
  .picks{display:flex; gap:8px; flex-wrap:wrap; margin:16px 0 18px}
  .pick{border:1px solid var(--line); background:var(--card); color:var(--soft); border-radius:999px; padding:7px 13px; font-size:.8rem; font-family:var(--body); cursor:pointer; transition:all .18s}
  .pick:hover{border-color:var(--accent)}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:12px}
  .panel-h{font-size:.8rem; color:var(--accent-2); font-weight:600; margin-bottom:12px}
  .legs{font-size:.72rem; color:var(--soft); text-align:center; margin-top:2px}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px}
  .stat{background:var(--card-2); border-radius:12px; padding:11px 13px}
  .stat .l{font-size:.72rem; color:var(--soft)}
  .stat .v{font-size:.95rem; color:var(--ink); font-weight:600; margin-top:2px}
  .split{margin-bottom:12px}
  .split-top{display:flex; justify-content:space-between; font-size:.78rem; color:var(--soft); margin-bottom:8px}
  .split-top b{color:var(--accent-2); font-weight:600}
  input[type=range]{width:100%; accent-color:var(--accent); height:22px}
  .split-note{font-size:.72rem; color:var(--soft); margin-top:7px}
  .safety{background:var(--card-2); border-radius:12px; padding:11px 14px; margin-bottom:14px}
  .safety p{margin:0; font-size:.8rem; color:var(--ink); line-height:1.5; opacity:.92}
  footer{text-align:center; color:var(--soft); font-size:.78rem; padding:26px 0 8px; border-top:1px solid var(--line); margin-top:26px}
  footer a{color:var(--accent-2); text-decoration:none}
  footer a:hover{text-decoration:underline}
  .langwrap{position:relative}
  .langmenu{position:absolute; top:calc(100% + 8px); right:0; min-width:172px; background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:6px; display:none; flex-direction:column; z-index:60}
  .langmenu.open{display:flex}
  .langmenu button{display:flex; align-items:center; gap:6px; background:transparent; border:none; color:var(--soft); text-align:left; padding:9px 11px; border-radius:9px; font-family:var(--body); font-size:.9rem; cursor:pointer}
  .langmenu button:hover{background:var(--card-2); color:var(--ink)}
  .langmenu button.on{color:var(--accent-2)}
  .langmenu .lc{display:inline-block; width:26px; font-weight:600; font-size:.75rem; color:var(--soft)}
  .langmenu button.on .lc{color:var(--accent-2)}
  .hidden{display:none}
  @media (max-width:380px){ .intro h1{font-size:2.1rem} .demo h2{font-size:1.85rem} }
  @media (prefers-reduced-motion:reduce){ .intro-mark,.intro h1,.intro .lead,.ticker,.cta,.demo{animation:none} }
</style>
</head>

    $("#chain").innerHTML=s;
    var used=p.legs.slice(0,Math.max(0,n-1));
    if(used.length){ var mn=Math.min.apply(null,used), mx=Math.max.apply(null,used); $("#legs").textContent=ui.legs(mn,mx); } else { $("#legs").textContent=""; }
    var saving=Math.round((1-1/n)*100); $("#splitVal").textContent=ui.splitVal(n,saving);
  }

  function hubUrl(){ return "https://ikartuzov-hub.github.io/seedwave-catalog/hub/?lang="+lang+"&theme="+theme; }
  function botUrl(){ return "https://t.me/SeedWaveBot?start=tonight_"+lang; }
  $("#brandLink").setAttribute("href", hubUrl());
  $("#toFunnel").addEventListener("click", function(){ location.href=botUrl(); });
  $("#toDemo").addEventListener("click", function(){ $("#intro").classList.add("hidden"); $("#demo").classList.remove("hidden"); window.scrollTo({top:0,behavior:"smooth"}); });

  $("#themeBtn").addEventListener("click", function(){
    theme=(theme==="light"?"night":"light");
    try{localStorage.setItem("tn_theme",theme)}catch(e){}
    applyTheme(theme); $("#brandLink").setAttribute("href", hubUrl());
    try{ var u=new URL(location.href); u.searchParams.set("theme",theme); history.replaceState(null,"",u.toString()); }catch(e){}
  });

  function buildLangList(){
    var box=$("#langmenu"); box.innerHTML="";
    liveLangs.forEach(function(code){
      var b=document.createElement("button"); if(code===lang) b.className="on";
      b.innerHTML='<span class="lc">'+code.toUpperCase()+'</span>'+langNames[code];
      b.onclick=function(){ if(code===lang){ closeLang(); return; } try{localStorage.setItem("tn_lang",code)}catch(e){} var u=new URL(location.href); u.searchParams.set("lang",code); u.searchParams.set("theme",theme); location.href=u.toString(); };
      box.appendChild(b);
    });
  }
  function closeLang(){ $("#langmenu").classList.remove("open"); $("#langBtn").setAttribute("aria-expanded","false"); }
  $("#langBtn").addEventListener("click", function(e){ e.stopPropagation(); var m=$("#langmenu"); var open=m.classList.toggle("open"); this.setAttribute("aria-expanded",open?"true":"false"); if(open) buildLangList(); });
  document.addEventListener("click", function(e){ if(!e.target.closest(".langwrap")) closeLang(); });

  $("#venues").addEventListener("input", renderTour);

  $("#yr").textContent=new Date().getFullYear();
  applyLocale(); renderPicks(); renderTour();
})();
</script>
</body>
</html>
